name: CI (development)

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate client
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          DATABASE_SHADOW_URL: 'postgresql://dummy:dummy@localhost:5432/dummy_shadow'
        run: npm run prisma:generate

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
